name: Brother-X-Final-Trigger

on:
  workflow_dispatch: # Isse "Run Workflow" ka button dikhega

jobs:
  beast-rdp:
    runs-on: windows-latest
    timeout-minutes: 4320

    steps:
      - name: 🚀 1. Turbo Mode & Admin Check
        shell: pwsh
        run: |
          # Disable Defender to save CPU
          Set-MpPreference -DisableRealtimeMonitoring $true
          # High Performance Plan
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          # Enable Legacy Gaming
          dism.exe /online /enable-feature /featurename:DirectPlay /all /norestart

      - name: 🔊 2. Sound & Graphics Setup
        shell: pwsh
        run: |
          # Direct choco install is 100% stable
          choco install vb-cable directx vcredist-all opengl-utility -y --no-progress
          Set-Service -Name TermService -StartupType Automatic

      - name: 🎮 3. All-In-One Gaming & Coding Suite
        shell: pwsh
        run: |
          # Essential Apps for Beast RDP
          choco install steam epicgameslauncher discord vscode git python nodejs-lts vlc obs-studio -y --no-progress
          # Minecraft Silent Setup
          Invoke-WebRequest -Uri "https://launcher.mojang.com/download/MinecraftInstaller.msi" -OutFile "C:\mc.msi"
          msiexec.exe /i "C:\mc.msi" /qn /norestart

      - name: 🐉 4. WSL Kali Linux (Pro Version)
        shell: pwsh
        run: |
          # Enable WSL1 without restart
          dism.exe /online /enable-feature /featurename:Microsoft-Windows-Subsystem-Linux /all /norestart
          Invoke-WebRequest -Uri "https://aka.ms/wsl-kali-linux-new" -OutFile "C:\kali.appx"
          Add-AppxPackage -Path "C:\kali.appx"

      - name: 🔐 5. Admin User & Wallpaper
        shell: pwsh
        env:
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
          WALLPAPER_URL: "https://i.imgur.com/Sq0YyOV.jpeg"
        run: |
          $user = "adminr"
          $plainPass = $Env:ADMIN_PASS
          $secPass = ConvertTo-SecureString $plainPass -AsPlainText -Force
          # Create Admin User
          if (-not (Get-LocalUser -Name $user -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $user -Password $secPass -FullName "Brother-X God"
            Add-LocalGroupMember -Group Administrators -Member $user
          }
          # Registry for Auto-Logon
          $reg = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
          Set-ItemProperty -Path $reg -Name "DefaultUserName" -Value $user
          Set-ItemProperty -Path $reg -Name "DefaultPassword" -Value $plainPass
          Set-ItemProperty -Name "AutoAdminLogon" -Value "1" -Path $reg
          Invoke-WebRequest -Uri $Env:WALLPAPER_URL -OutFile "C:\Users\Public\gojo.jpg"

      - name: 🛰️ 6. Tailscale & 72H Keep Alive
        shell: pwsh
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          choco install tailscale -y --no-progress
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey $Env:TAILSCALE_AUTHKEY --hostname "brother-x-pc"
          $end = (Get-Date).AddHours(72)
          while ((Get-Date) -lt $end) {
            Write-Host "PC Status: Online & Beast Mode Active | $((Get-Date).ToString())"
            Start-Sleep -Seconds 60
          }
