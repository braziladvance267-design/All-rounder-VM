name: Brother-X-Auto-God-PC

on:
  workflow_dispatch:

jobs:
  beast-rdp:
    runs-on: windows-latest
    timeout-minutes: 4320 # 72 Hours

    steps:
      - name: 🚀 1. Turbo Performance & Gaming Fix
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          # Essential Runtimes for Gaming & Audio
          choco install directx vcredist-all vb-cable -y --no-progress
          dism.exe /online /enable-feature /featurename:DirectPlay /all /norestart

      - name: 🎮 2. Pro Gaming & Coding Suite
        shell: pwsh
        run: |
          # Gaming & Dev tools in one go
          choco install steam epicgameslauncher discord vscode git python nodejs-lts vlc obs-studio -y --no-progress
          Invoke-WebRequest -Uri "https://launcher.mojang.com/download/MinecraftInstaller.msi" -OutFile "C:\mc.msi"
          msiexec.exe /i "C:\mc.msi" /qn /norestart

      - name: 🐉 3. WSL Kali Linux (Pro Setup)
        shell: pwsh
        run: |
          dism.exe /online /enable-feature /featurename:Microsoft-Windows-Subsystem-Linux /all /norestart
          Invoke-WebRequest -Uri "https://aka.ms/wsl-kali-linux-new" -OutFile "C:\kali.appx"
          Add-AppxPackage -Path "C:\kali.appx"

      - name: 🔐 4. Auto-Generate Secure Admin User
        shell: pwsh
        run: |
          $user = "adminr"
          # Generating a Microsoft-compliant strong password
          $dynamicPass = "GojoSatoru@99" + (Get-Random -Minimum 100 -Maximum 999) + "!"
          $secPass = ConvertTo-SecureString $dynamicPass -AsPlainText -Force
          
          if (-not (Get-LocalUser -Name $user -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $user -Password $secPass -FullName "Brother-X God" -Description "Full Admin Access"
            Add-LocalGroupMember -Group Administrators -Member $user
          }
          
          # Auto-Logon Registry
          $reg = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
          Set-ItemProperty -Path $reg -Name "DefaultUserName" -Value $user
          Set-ItemProperty -Path $reg -Name "DefaultPassword" -Value $dynamicPass
          Set-ItemProperty -Name "AutoAdminLogon" -Value "1" -Path $reg
          
          # Final Credentials Output (Visible in Logs)
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "      BROTHER-X RDP CREDENTIALS        " -ForegroundColor Yellow
          Write-Host "========================================" -ForegroundColor Cyan
          Write-Host "USERNAME: $user" -ForegroundColor Green
          Write-Host "PASSWORD: $dynamicPass" -ForegroundColor Green
          Write-Host "========================================" -ForegroundColor Cyan
          
          # Save to a file for user safety
          $dynamicPass | Out-File -FilePath "C:\Users\Public\Credentials.txt"
          Invoke-WebRequest -Uri "https://i.imgur.com/Sq0YyOV.jpeg" -OutFile "C:\Users\Public\gojo.jpg"

      - name: 🛰️ 5. Tailscale & 72H Keep Alive
        shell: pwsh
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          choco install tailscale -y --no-progress
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey $Env:TAILSCALE_AUTHKEY --hostname "brother-x-pc"
          $end = (Get-Date).AddHours(72)
          while ((Get-Date) -lt $end) {
            Write-Host "God-Mode PC Status: Online | $((Get-Date).ToString())"
            Start-Sleep -Seconds 60
          }
