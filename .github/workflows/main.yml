name: Ultimate-Beast-RDP

on:
  workflow_dispatch:

env:
  WALLPAPER_URL: "https://i.imgur.com/Sq0YyOV.jpeg"
  LOG_DIR: "C:\\Users\\Public\\rdp_setup_logs"

jobs:
  rdp-run:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: 1. Prepare Environment & Logging
        shell: pwsh
        run: |
          New-Item -Path $env:LOG_DIR -ItemType Directory -Force | Out-Null
          "Setup Started" | Out-File -FilePath (Join-Path $env:LOG_DIR "init.log")

      - name: 2. Beast Performance & Gaming Drivers
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          choco install directx vcredist-all vb-cable -y --no-progress

      - name: 3. Enable WSL & Hyper-V (Features)
        shell: pwsh
        run: |
          dism.exe /online /enable-feature /featurename:Microsoft-Windows-Subsystem-Linux /all /norestart
          dism.exe /online /enable-feature /featurename:VirtualMachinePlatform /all /norestart
          dism.exe /online /enable-feature /featurename:Microsoft-Hyper-V-All /all /norestart

      - name: 4. Coding & Programming Suite
        shell: pwsh
        run: |
          choco install git python nodejs-lts openjdk vscode -y --no-progress

      - name: 5. Android Emulator & Media Tools
        shell: pwsh
        run: |
          choco install ldplayer obs-studio vlc -y --no-progress

      - name: 6. User Creation & AutoLogon
        shell: pwsh
        env:
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          $user = "adminr"
          $pw = ConvertTo-SecureString $Env:ADMIN_PASS -AsPlainText -Force
          if (-not (Get-LocalUser -Name $user -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name $user -Password $pw -FullName "Beast Admin" -Description "Power User"
            Add-LocalGroupMember -Group Administrators -Member $user
          }
          $reg = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
          Set-ItemProperty -Path $reg -Name "DefaultUserName" -Value $user
          Set-ItemProperty -Path $reg -Name "DefaultPassword" -Value $Env:ADMIN_PASS
          Set-ItemProperty -Value "1" -Name "AutoAdminLogon" -Path $reg

      - name: 7. Download Wallpaper & Setup RDP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:WALLPAPER_URL -OutFile "C:\Users\Public\gojo.jpg"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: 8. Tailscale Connection
        shell: pwsh
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          choco install tailscale -y --no-progress
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey $Env:TAILSCALE_AUTHKEY --hostname "beast-rdp"

      - name: 9. Keep Alive Loop (6 Hours)
        shell: pwsh
        run: |
          $end = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $end) {
            Write-Host "Beast RDP is Running... $((Get-Date).ToString())"
            Start-Sleep -Seconds 60
          }
