name: Brother-X-Advance-God-PC

on:
  workflow_dispatch:

jobs:
  beast-rdp:
    runs-on: windows-latest
    timeout-minutes: 4320

    steps:
      - name: 🚀 1. Performance & Graphics Engine
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          powercfg /s 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          choco install directx vcredist-all vb-cable 7zip processlasso -y --no-progress
          dism.exe /online /enable-feature /featurename:DirectPlay /all /norestart

      - name: 🎮 2. Install Apps & Minecraft
        shell: pwsh
        run: |
          choco install steam epicgameslauncher discord vscode git python nodejs-lts vlc obs-studio -y --no-progress
          Invoke-WebRequest -Uri "https://launcher.mojang.com/download/MinecraftInstaller.msi" -OutFile "C:\mc.msi"
          msiexec.exe /i "C:\mc.msi" /qn /norestart

      - name: 🛠️ 3. "Magic Advance Patch" (DLL Injection)
        shell: pwsh
        run: |
          # Patching success confirmed from previous run
          Invoke-WebRequest -Uri "https://github.com/pal1000/mesa-dist-win/releases/download/23.1.3/mesa3d-23.1.3-release-msvc.7z" -OutFile "C:\mesa.7z"
          & "C:\Program Files\7-Zip\7z.exe" e "C:\mesa.7z" -oC:\mesa_files x64\opengl32.dll -r
          $mcPaths = @(
            "C:\Program Files (x86)\Minecraft Launcher\runtime\java-runtime-gamma\windows-x64\java-runtime-gamma\bin",
            "C:\Program Files (x86)\Minecraft Launcher\runtime\java-runtime-alpha\windows-x64\java-runtime-alpha\bin",
            "C:\Program Files (x86)\Minecraft Launcher\runtime\java-runtime-beta\windows-x64\java-runtime-beta\bin"
          )
          foreach ($path in $mcPaths) {
            if (!(Test-Path $path)) { New-Item -ItemType Directory -Force -Path $path }
            Copy-Item -Path "C:\mesa_files\opengl32.dll" -Destination $path -Force
          }
          Write-Host "Advance Graphics Patch Applied Successfully!" -ForegroundColor Cyan

      - name: 🔐 4. Secure Admin & Password Final Fix
        shell: pwsh
        run: |
          $user = "adminr"
          # Random string for password to avoid 'InvalidPasswordException'
          # Using format: [RandomChars] + [Numbers] + [SpecialChar]
          $randomPart = -join ((65..90) + (97..122) | Get-Random -Count 8 | ForEach-Object {[char]$_})
          $dynamicPass = $randomPart + (Get-Random -Minimum 100 -Maximum 999) + "!"
          $secPass = ConvertTo-SecureString $dynamicPass -AsPlainText -Force
          
          # Delete existing user to avoid conflicts
          if (Get-LocalUser -Name $user -ErrorAction SilentlyContinue) {
            Remove-LocalUser -Name $user
          }
          
          # Create user with high complexity password
          New-LocalUser -Name $user -Password $secPass -FullName "Brother-X God" -Description "Ultimate Admin"
          Add-LocalGroupMember -Group Administrators -Member $user
          
          $reg = "HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon"
          Set-ItemProperty -Path $reg -Name "DefaultUserName" -Value $user
          Set-ItemProperty -Path $reg -Name "DefaultPassword" -Value $dynamicPass
          Set-ItemProperty -Name "AutoAdminLogon" -Value "1" -Path $reg
          
          Write-Host "========================================" -ForegroundColor Yellow
          Write-Host "   SUCCESS! COPY THESE CREDENTIALS    " -ForegroundColor Cyan
          Write-Host "USERNAME: $user" -ForegroundColor Green
          Write-Host "PASSWORD: $dynamicPass" -ForegroundColor Green
          Write-Host "========================================" -ForegroundColor Yellow

      - name: 🛰️ 5. Tailscale & 72H Ultra Keep Alive
        shell: pwsh
        env:
          TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          choco install tailscale -y --no-progress
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey $Env:TAILSCALE_AUTHKEY --hostname "brother-x-beast"
          $end = (Get-Date).AddHours(72)
          while ((Get-Date) -lt $end) {
            Write-Host "God-Mode PC Status: Online | $((Get-Date).ToString())"
            Start-Sleep -Seconds 60
          }
